services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ai-ceo
      POSTGRES_PASSWORD: ai-ceo
      POSTGRES_DB: ai-ceo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai-ceo -d ai-ceo"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://ai-ceo:ai-ceo@db:5432/ai-ceo
      PORT: "3100"
      SERVE_UI: "true"
      AI_CEO_DEPLOYMENT_MODE: "authenticated"
      AI_CEO_DEPLOYMENT_EXPOSURE: "private"
      AI_CEO_PUBLIC_URL: "${AI_CEO_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - ai-ceo-data:/ai-ceo
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  ai-ceo-data:
